version: "3.8"

services:

  validra:
    build: ../validra-core
    container_name: validra
    ports:
      - "8000:8000"
    depends_on:
      - ollama
    environment:
      - OLLAMA_URL=http://ollama:11434/api/generate

  ollama:
    image: ollama/ollama
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    entrypoint: ["/bin/sh", "-c", "/init-ollama.sh"]
    volumes:
      - ./init-ollama.sh:/init-ollama.sh

volumes:
  ollama_data: